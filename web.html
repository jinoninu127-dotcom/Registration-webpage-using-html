<!DOCTYPE html>
<html>
<head>
<title>Student Registration Form</title>

<style>
body{
    font-family: Arial;
     background-image:url("bg.AVIF");
     background-size:cover;
     background-repeat: no-repeat;
     background-position: center;
}

form{
    width:400px;
}

button{
    padding:8px 15px;
    border:none;
    border-radius:5px;
}

.submit{
    background-color:rgba(240, 36, 36, 0.462);
    color:white;
}

.reset{
    background-color:bisque;
    color:white;
}
</style>

</head>

<body>


<h1>Student Registration Form</h1>

<form>

<label>Name:</label><br>
<input type="text"><br><br>

<label>Age:</label><br>
<input type="number"><br><br>

<label>Roll No:</label><br>
<input type="text"><br><br>

<label>Register No:</label><br>
<input type="text"><br><br>

<label>Gender:</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<br><br>

<h3>10th Details</h3>

<label>10th School Name:</label><br>
<input type="text"><br><br>

<label>10th Mark:</label><br>
<input type="number"><br><br>

<h3>11th Details</h3>

<label>11th School Name:</label><br>
<input type="text"><br><br>

<label>11th Course Name:</label><br>
<select>
<option>Computer Science</option>
<option>Commerce</option>
<option>Biology</option>
</select><br><br>

<label>11th Mark:</label><br>
<input type="number"><br><br>

<h3>12th Details</h3>

<label>12th School Name:</label><br>
<input type="text"><br><br>

<label>12th Course Name:</label><br>
<select>
<option>Computer Science</option>
<option>Biology</option>
<option>Commerce</option>
</select><br><br>

<label>12th Mark:</label><br>
<input type="number"><br><br>

<h3>College Details</h3>

<label>College Name:</label><br>
<input type="text"><br><br>

<label>Course Name:</label><br>
<select>
<option>B.Sc.AI&ML</option>
<option>B.Sc Computer Science</option>
<option>BCA</option>
<option>B.Com</option>
<option>BBA</option>
</select><br><br>

<label>Industry Name:</label><br>
<select>
<option>Face prep</option>
<option>kalvium</option>
</select><br><br>

<label>Class Shift:</label><br>
<input type="radio" name="shift"> Morning
<input type="radio" name="shift"> Evening
<br><br>

<label>Timing:</label><br>
<input type="time"><br><br>

<label>Skills:</label><br>
<input type="checkbox"> HTML
<input type="checkbox"> CSS
<input type="checkbox"> Java
<input type="checkbox"> Python
<br><br>

<button class="submit">Register</button>
<button class="reset" type="reset">Clear</button>

</form>

</body>
</html>
